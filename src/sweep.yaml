program: src/train.py
project: da6401_assignment_1
name: hyperparam_sweep

method: random

metric:
  name: val/val_accuracy
  goal: maximize

parameters:
  epochs:
    values: [10, 15]

  batch_size:
    values: [32, 64]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  learning_rate:
    values: [0.001, 0.01]

  hidden_size:
    values: 
      - [64, 64, 64]  
      - [128, 128, 128]
      - [128, 128]

  activation:
    values: ["sigmoid", "tanh", "relu"]

  weight_init:
    values: ["random", "xavier"]